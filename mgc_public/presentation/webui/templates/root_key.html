<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGC Blackbox - Root Key</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Noto Sans', 'DejaVu Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo {
            width: 84px;
            height: 50px;
            border-radius: 12px;
        }
        .slogan {
            font-size: 14px;
            color: #8b9dc3;
            line-height: 1.4;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .warning {
            background: rgba(255,193,7,0.15);
            border: 1px solid rgba(255,193,7,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .warning-text {
            color: #ffc107;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #c9d1d9;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
        }
        .form-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0,212,255,0.2);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,212,255,0.4);
        }
        .btn-danger {
            background: rgba(255,59,48,0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255,59,48,0.3);
        }
        .btn-danger:hover {
            background: rgba(255,59,48,0.3);
        }
        .hidden {
            display: none;
        }
        .error {
            background: rgba(255,59,48,0.15);
            border: 1px solid rgba(255,59,48,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="/static/MGC_LOGO.png" class="logo" alt="MGC Logo">
        <div class="slogan">
            A trusted boundary for intent‑safe AI execution.
        </div>
    </div>
    
    <div class="container" id="verifyView">
        <div class="warning">
            <div class="warning-text">[WARNING] Please remember your personal key and weight parameter.</div>
            <div class="warning-text" style="margin-top: 10px;">[WARNING] Loss will result in unrecoverable data and failed migration.</div>
        </div>
        
        <div id="dbPathField" class="form-group" style="display: none;">
            <label class="form-label">Database Path (for migration):</label>
            <input type="text" class="form-input" id="dbPath" placeholder="Enter old database path">
        </div>
        
        <div class="form-group">
            <label class="form-label">Personal Key:</label>
            <input type="text" class="form-input" id="personalKey" placeholder="Enter your personal key" 
                   onfocus="this.type='text'" onblur="this.type='password'">
        </div>
        
        <div class="form-group">
            <label class="form-label">Weight Parameter (1-9):</label>
            <input type="text" class="form-input" id="weightParam" maxlength="1" placeholder="Enter weight parameter">
        </div>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="submit()">1 - Confirm</button>
            <button class="btn btn-danger" onclick="cancel()">2 - Cancel</button>
        </div>

        <div id="errorView" class="hidden">
            <div class="error" id="errorMessage"></div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="retry()">Try Again</button>
                <button class="btn btn-danger" onclick="cancel()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        fetch('/api/install/status').then(r => r.json()).then(data => {
            if (data.mode === 'reload') {
                document.getElementById('dbPathField').style.display = 'block';
            }
        });
        
        async function submit() {
            const personalKey = document.getElementById('personalKey').value;
            const weightParam = document.getElementById('weightParam').value;
            const dbPath = document.getElementById('dbPath').value;
            
            if (!personalKey) {
                alert('Personal key is required');
                return;
            }
            if (!weightParam || weightParam < '1' || weightParam > '9') {
                alert('Weight must be a single digit 1-9');
                return;
            }

            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            let countdown = 3;
            btn.innerText = 'Verifying (' + countdown + 's)...';

            const timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.innerText = 'Verifying (' + countdown + 's)...';
                } else {
                    clearInterval(timer);
                    doSubmit();
                }
            }, 1000);

            async function doSubmit() {
                try {
                    const response = await fetch('/api/install/root-key', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            personal_key: personalKey,
                            weight_param: weightParam,
                            db_path: dbPath
                        })
                    });
                    const data = await response.json();
                    if ((data.status === 'success' || data.status === 'ok') && data.redirect) {
                        window.location.href = data.redirect;
                    } else if (data.status === 'error') {
                        alert('Root key error, please try again.');
                        btn.disabled = false;
                        btn.innerText = '1 - Confirm';
                    } else if (!response.ok) {
                        alert('Error: ' + (data.detail || 'Unknown error'));
                        btn.disabled = false;
                        btn.innerText = '1 - Confirm';
                    }
                } catch (e) {
                    alert('Error: ' + e);
                    btn.disabled = false;
                    btn.innerText = '1 - Confirm';
                }
            }
        }
        
        async function cancel() {
            const btn = document.querySelector('.btn-danger');
            btn.disabled = true;
            let countdown = 3;
            btn.innerText = 'Closing (' + countdown + 's)...';
            
            const timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.innerText = 'Closing (' + countdown + 's)...';
                } else {
                    clearInterval(timer);
                    try {
                        document.body.innerHTML = '<div style="text-align:center;margin-top:100px;color:#666;">Installation cancelled.</div>';
                    } catch (e) {}
                    window.close();
                    window.location.href = 'about:blank';
                    setTimeout(() => window.close(), 100);
                }
            }, 1000);
            
            try {
                await fetch('/api/install/cancel', {method: 'POST'});
                await fetch('/api/mgc/service/stop', {method: 'POST'});
            } catch (e) {}
        }

        function retry() {
            document.getElementById('errorView').classList.add('hidden');
            document.getElementById('verifyView').classList.remove('hidden');
            document.getElementById('personalKey').value = '';
            document.getElementById('weightParam').value = '';
            const btn = document.querySelector('#verifyView .btn-primary');
            btn.disabled = false;
            btn.innerText = '1 - Confirm';
        }
    </script>
</body>
</html>
