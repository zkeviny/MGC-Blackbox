<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGC Blackbox - GET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }
        .header-right {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #4ade80;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #22c55e;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-success {
            background: #10b981;
            color: #fff;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-warning {
            background: #f59e0b;
            color: #1a1a2e;
        }
        .btn-warning:hover {
            background: #d97706;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .title {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .info-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .info-type {
            background: #4ade80;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .info-actions {
            display: flex;
            gap: 8px;
        }
        .info-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .info-field {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .info-field-label {
            color: #94a3b8;
            margin-right: 4px;
        }
        .info-field-value {
            color: #fff;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .modal-title {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .modal-message {
            color: #94a3b8;
            margin-bottom: 20px;
            text-align: left;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">MGC Blackbox</div>
            <button class="btn btn-secondary" onclick="location.href='/skill'">← Back to Skill</button>
        </div>
        <div class="header-right">
            <button class="btn btn-primary" onclick="location.href='/save'">SAVE</button>
            <button class="btn btn-primary" onclick="location.href='/get'">GET</button>
        </div>
    </div>

    <div class="container">
        <h1 class="title">Stored Information</h1>
        
        <div id="infoList" class="info-list">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <div class="modal" id="sealModal">
        <div class="modal-content">
            <div class="modal-title">Seal Script</div>
            <div class="modal-message">
                <p style="margin-bottom: 10px;">Enter trusted node's node_pub:</p>
                <textarea id="sealNodePub" placeholder="Please confirm the node is trusted" style="width: 100%; min-height: 104px; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; color: #fff; font-size: 12px; font-family: monospace;"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeSealModal()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmSeal()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let tokenInitialized = false;
        
        async function initToken() {
            try {
                const response = await fetch('/api/token');
                if (response.ok) {
                    window.MGC_TOKEN = await response.text();
                    tokenInitialized = true;
                    console.log('Token initialized successfully, token:', window.MGC_TOKEN ? window.MGC_TOKEN.substring(0, 20) + '...' : 'EMPTY');
                } else {
                    console.error('Token fetch failed, status:', response.status);
                    tokenInitialized = true;
                }
            } catch (e) {
                console.error('Failed to get token:', e);
                tokenInitialized = true;
            }
        }
        initToken();
        
        async function waitForToken() {
            while (!tokenInitialized) {
                await new Promise(r => setTimeout(r, 100));
            }
        }
        
        async function loadInfoList() {
            console.log('loadInfoList start, waiting for token, tokenInitialized:', tokenInitialized);
            let waitCount = 0;
            while (!tokenInitialized && waitCount < 100) {
                await new Promise(r => setTimeout(r, 100));
                waitCount++;
            }
            if (waitCount >= 100) {
                console.error('Token wait timeout');
            }
            console.log('loadInfoList proceed, tokenInitialized:', tokenInitialized, 'MGC_TOKEN:', window.MGC_TOKEN ? window.MGC_TOKEN.substring(0, 20) + '...' : 'EMPTY');
            try {
                const response = await fetch('/api/mgc/proxy/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-MGC-Token': window.MGC_TOKEN || ''
                    },
                    body: JSON.stringify({})
                });
                
                const result = await response.json();
                const listDiv = document.getElementById('infoList');
                
                let items = [];
                if (result.code === 200 && result.data) {
                    items = Array.isArray(result.data) ? result.data : result.data.info_list || [];
                } else if (result.code === 201 && result.data && result.data.info_list) {
                    items = result.data.info_list;
                }
                
                items = items.filter(item => item.info_owner !== 'system');
                
                if (items.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">No stored information found</div>';
                    return;
                }
                
                listDiv.innerHTML = items.map(item => {
                    let fieldsHtml = '';
                    if (item.info_type) fieldsHtml += `<span class="info-field"><span class="info-field-label">type:</span><span class="info-field-value">${item.info_type.length > 30 ? item.info_type.substring(0, 30) + '...' : item.info_type}</span></span>`;
                    if (item.info_owner) fieldsHtml += `<span class="info-field"><span class="info-field-label">owner:</span><span class="info-field-value">${item.info_owner.length > 30 ? item.info_owner.substring(0, 30) + '...' : item.info_owner}</span></span>`;
                    if (item.diff_1) fieldsHtml += `<span class="info-field"><span class="info-field-label">diff_1:</span><span class="info-field-value">${item.diff_1.length > 30 ? item.diff_1.substring(0, 30) + '...' : item.diff_1}</span></span>`;
                    if (item.diff_2) fieldsHtml += `<span class="info-field"><span class="info-field-label">diff_2:</span><span class="info-field-value">${item.diff_2.length > 30 ? item.diff_2.substring(0, 30) + '...' : item.diff_2}</span></span>`;
                    if (item.diff_3) fieldsHtml += `<span class="info-field"><span class="info-field-label">diff_3:</span><span class="info-field-value">${item.diff_3.length > 30 ? item.diff_3.substring(0, 30) + '...' : item.diff_3}</span></span>`;
                    if (item.ext01) fieldsHtml += `<span class="info-field"><span class="info-field-label">ext01:</span><span class="info-field-value">${item.ext01.length > 30 ? item.ext01.substring(0, 30) + '...' : item.ext01}</span></span>`;
                    if (item.ext02) fieldsHtml += `<span class="info-field"><span class="info-field-label">ext02:</span><span class="info-field-value">${item.ext02.length > 30 ? item.ext02.substring(0, 30) + '...' : item.ext02}</span></span>`;
                    if (item.ext03) {
                        const ext03Val = item.ext03.length > 15 ? item.ext03.substring(0, 15) + '...' : item.ext03;
                        fieldsHtml += `<span class="info-field"><span class="info-field-label">ext03:</span><span class="info-field-value">${ext03Val}</span></span>`;
                    }

                    const hasExt01 = !!item.ext01;
                    const hasExt02 = !!item.ext02;
                    const hasExt03 = !!item.ext03;

                    return `
                        <div class="info-item">
                            <div class="info-header">
                                <span class="info-type">${item.info_type || 'unknown'}</span>
                                <div class="info-actions">
                                    ${hasExt01 && hasExt02 ? `<button class="btn btn-warning" data-owner="${encodeURIComponent(item.info_owner)}" data-ext01="${encodeURIComponent(item.ext01)}" data-ext02="${encodeURIComponent(item.ext02)}" onclick="runScriptWithArgsFromBtn(this)">Run with Args</button>` : ''}
                                    ${hasExt01 ? `<button class="btn btn-success" data-owner="${encodeURIComponent(item.info_owner)}" data-ext01="${encodeURIComponent(item.ext01)}" onclick="runScriptFromBtn(this)">Run</button>` : ''}
                                    ${hasExt01 && !hasExt03 ? `<button class="btn btn-secondary" data-owner="${encodeURIComponent(item.info_owner)}" data-ext01="${encodeURIComponent(item.ext01)}" data-type="${encodeURIComponent(item.info_type)}" onclick="sealScriptFromBtn(this)">Seal</button>` : ''}
                                    <button class="btn btn-primary" data-type="${encodeURIComponent(item.info_type)}" data-owner="${encodeURIComponent(item.info_owner)}" data-diff1="${encodeURIComponent(item.diff_1 || '')}" data-diff2="${encodeURIComponent(item.diff_2 || '')}" data-diff3="${encodeURIComponent(item.diff_3 || '')}" onclick="getInfoFromBtn(this)">Get</button>
                                </div>
                            </div>
                            <div class="info-fields">
                                ${fieldsHtml}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('API call failed:', error);
                document.getElementById('infoList').innerHTML = '<div class="error">Failed to load information<br><small>' + (error.message || 'Connection failed') + '</small></div>';
            }
        }
        
        function getInfoFromBtn(btn) {
            const params = {
                info_type: decodeURIComponent(btn.dataset.type),
                info_owner: decodeURIComponent(btn.dataset.owner)
            };
            if (btn.dataset.diff1) params.diff_1 = decodeURIComponent(btn.dataset.diff1);
            if (btn.dataset.diff2) params.diff_2 = decodeURIComponent(btn.dataset.diff2);
            if (btn.dataset.diff3) params.diff_3 = decodeURIComponent(btn.dataset.diff3);
            
            localStorage.setItem('mgc_get_params', JSON.stringify(params));
            location.href = '/get_info';
        }
        
        function runScriptFromBtn(btn) {
            console.log('runScriptFromBtn called, owner:', btn.dataset.owner, 'ext01:', btn.dataset.ext01);
            runScript(btn.dataset.owner, btn.dataset.ext01);
        }

        function runScriptWithArgsFromBtn(btn) {
            console.log('runScriptWithArgsFromBtn called, owner:', btn.dataset.owner, 'ext01:', btn.dataset.ext01, 'ext02:', btn.dataset.ext02);
            showArgsModal(btn.dataset.owner, btn.dataset.ext01, btn.dataset.ext02);
        }

        function getInfo(infoType, infoOwner, diff1, diff2, diff3) {
            const params = {
                info_type: decodeURIComponent(infoType),
                info_owner: decodeURIComponent(infoOwner)
            };
            if (diff1) params.diff_1 = decodeURIComponent(diff1);
            if (diff2) params.diff_2 = decodeURIComponent(diff2);
            if (diff3) params.diff_3 = decodeURIComponent(diff3);

            localStorage.setItem('mgc_get_params', JSON.stringify(params));
            location.href = '/get_info';
        }

        async function runScript(infoOwner, ext01, ext02) {
            console.log('runScript called, infoOwner:', infoOwner, 'ext01:', ext01, 'ext02:', ext02);
            await waitForToken();
            const owner = decodeURIComponent(infoOwner);
            console.log('runScript proceeding, owner decoded:', owner);
            try {
                const response = await fetch('/api/mgc/proxy/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-MGC-Token': window.MGC_TOKEN || ''
                    },
                    body: JSON.stringify({
                        info_type: 'script',
                        info_owner: owner,
                        action: 'run'
                    })
                });

                console.log('runScript response status:', response.status);
                const result = await response.json();
                console.log('runScript result:', result);

                if (result.code === 200) {
                    showModal('Script Running', `Status: ${result.data.status}\nPID: ${result.data.pid || 'N/A'}`);
                } else {
                    showModal('Error', result.msg || 'Script execution failed');
                }
            } catch (error) {
                console.error('Script run failed:', error);
                showModal('Error', 'Failed to run script: ' + (error.message || 'Connection failed'));
            }
        }

        async function runScriptWithArgs(infoOwner, ext01, ext02, args) {
            console.log('runScriptWithArgs called, infoOwner:', infoOwner, 'ext01:', ext01, 'ext02:', ext02, 'args:', args);
            await waitForToken();
            const owner = decodeURIComponent(infoOwner);
            try {
                const response = await fetch('/api/mgc/proxy/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-MGC-Token': window.MGC_TOKEN || ''
                    },
                    body: JSON.stringify({
                        info_type: 'script',
                        info_owner: owner,
                        action: 'run',
                        ext01: decodeURIComponent(ext01),
                        ext02: decodeURIComponent(args)
                    })
                });

                const result = await response.json();

                if (result.code === 200) {
                    showModal('Script Running', `Status: ${result.data.status}\nPID: ${result.data.pid || 'N/A'}`);
                } else {
                    showModal('Error', result.msg || 'Script execution failed');
                }
            } catch (error) {
                console.error('Script run failed:', error);
                showModal('Error', 'Failed to run script: ' + (error.message || 'Connection failed'));
            }
        }

        function sealScriptFromBtn(btn) {
            console.log('sealScriptFromBtn called, owner:', btn.dataset.owner, 'ext01:', btn.dataset.ext01, 'type:', btn.dataset.type);
            window.pendingSealBtn = btn;
            document.getElementById('sealNodePub').value = '';
            document.getElementById('sealModal').classList.add('show');
        }

        function closeSealModal() {
            document.getElementById('sealModal').classList.remove('show');
            window.pendingSealBtn = null;
        }

        async function confirmSeal() {
            const nodePub = document.getElementById('sealNodePub').value.trim();
            if (!nodePub) {
                showModal('Error', 'Target node public key is required');
                return;
            }
            const btn = window.pendingSealBtn;
            if (!btn) {
                showModal('Error', 'No script selected');
                return;
            }
            const owner = decodeURIComponent(btn.dataset.owner);
            closeSealModal();
            showModal('Sealing', 'Sealing script...');
            await new Promise(r => setTimeout(r, 500));
            await sealScript(owner, btn.dataset.type, nodePub);
        }

        async function sealScript(infoOwner, infoType, nodePubKey) {
            console.log('sealScript called, infoOwner:', infoOwner, 'infoType:', infoType, 'nodePubKey:', nodePubKey ? '(provided)' : 'MISSING');
            await waitForToken();
            const owner = decodeURIComponent(infoOwner);
            try {
                const response = await fetch('/api/mgc/proxy/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-MGC-Token': window.MGC_TOKEN || ''
                    },
                    body: JSON.stringify({
                        info_type: 'script',
                        info_owner: owner,
                        action: 'SEAL',
                        ext02: nodePubKey
                    })
                });

                if (!response.ok) {
                    showModal('Error', 'HTTP error: ' + response.status);
                    return;
                }

                const result = await response.json();
                console.log('sealScript result:', result);

                if (result.code === 200 && result.data) {
                    const sealed = result.data;
                    const sealedData = JSON.stringify({
                        content: sealed.content,
                        ext_01: sealed.ext_01 || '',
                        ext_02: sealed.ext_02 || '',
                        ext_03: sealed.ext_03 || ''
                    });
                    localStorage.setItem('mgc_sealed_data', sealedData);
                    localStorage.setItem('mgc_sealed_owner', owner);
                    showModal('Success', 'Script sealed! Redirecting in 3 seconds...');
                    
                    let countdown = 3;
                    const interval = setInterval(() => {
                        countdown--;
                        if (countdown > 0) {
                            document.getElementById('modalMessage').textContent = 'Script sealed! Redirecting in ' + countdown + ' seconds...';
                        } else {
                            clearInterval(interval);
                            closeModal();
                            location.href = '/get_sealed_info';
                        }
                    }, 1000);
                } else {
                    showModal('Error', result.msg || result.hint || 'Seal failed');
                }
            } catch (error) {
                console.error('Seal failed:', error);
                showModal('Error', 'Failed to seal script: ' + (error.message || 'Connection failed'));
            }
        }

        function showArgsModal(infoOwner, ext01, ext02) {
            const defaultArgs = decodeURIComponent(ext02 || '');
            const args = prompt('Enter arguments:', defaultArgs);
            if (args !== null) {
                runScriptWithArgs(infoOwner, ext01, ext02, encodeURIComponent(args));
            }
        }

        function showModal(title, message) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('resultModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('show');
        }

        loadInfoList();
    </script>
</body>
</html>
