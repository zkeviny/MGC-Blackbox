<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/MGC_LOGO.png" type="image/png">
    <title>MGC Blackbox - GET INFO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }
        .header-right {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #4ade80;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #22c55e;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .title {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        .content-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .content-text {
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-copy {
            background: #3b82f6;
            color: #fff;
        }
        .btn-copy:hover {
            background: #2563eb;
        }
        .btn-download {
            background: #8b5cf6;
            color: #fff;
        }
        .btn-download:hover {
            background: #7c3aed;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        .error {
            text-align: center;
            padding: 60px;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">MGC Blackbox</div>
            <button class="btn btn-secondary" onclick="location.href='/skill'">← Back to Skill</button>
        </div>
        <div class="header-right">
            <button class="btn btn-primary" onclick="location.href='/save'">SAVE</button>
            <button class="btn btn-primary" onclick="location.href='/get'">GET</button>
        </div>
    </div>

    <div class="container">
        <h1 class="title">Sensitive Information</h1>
        <p style="text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 20px;">Decrypted successfully. Sealed scripts are decrypted at runtime only. Please keep safe.</p>
        
        <div id="contentArea">
            <div class="loading">Loading...</div>
        </div>
        
        <div class="actions" id="actionButtons" style="display: none;">
            <button class="btn btn-copy" onclick="copyContent()">Copy</button>
            <button class="btn btn-download" onclick="downloadContent()">Download</button>
            <button class="btn btn-primary" onclick="location.href='/get'">Cancel</button>
        </div>
    </div>

    <script>
        let tokenInitialized = false;
        let currentContent = '';
        
        async function initToken() {
            try {
                const response = await fetch('/api/token');
                if (response.ok) {
                    window.MGC_TOKEN = await response.text();
                    tokenInitialized = true;
                    console.log('Token initialized successfully');
                } else {
                    console.error('Token fetch failed, status:', response.status);
                }
            } catch (e) {
                console.error('Failed to get token:', e);
            }
        }
        initToken();
        
        async function waitForToken() {
            while (!tokenInitialized) {
                await new Promise(r => setTimeout(r, 100));
            }
        }
        
        async function loadContent() {
            await waitForToken();
            console.log('loadContent called, token:', window.MGC_TOKEN ? window.MGC_TOKEN.substring(0, 20) + '...' : 'EMPTY');
            const paramsStr = localStorage.getItem('mgc_get_params');
            if (!paramsStr) {
                document.getElementById('contentArea').innerHTML = '<div class="error">No data to display</div>';
                return;
            }
            
            const params = JSON.parse(paramsStr);
            console.log('loadContent params:', params);
            
            try {
                const response = await fetch('/api/mgc/proxy/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-MGC-Token': window.MGC_TOKEN || ''
                    },
                    body: JSON.stringify(params)
                });
                
                console.log('loadContent response status:', response.status);
                const result = await response.json();
                console.log('loadContent result:', result);
                
                const contentArea = document.getElementById('contentArea');
                
                if (result.code === 200) {
                    currentContent = result.data;
                    contentArea.innerHTML = `
                        <div class="content-box">
                            <pre class="content-text">${escapeHtml(currentContent)}</pre>
                        </div>
                    `;
                    document.getElementById('actionButtons').style.display = 'flex';
                } else {
                    contentArea.innerHTML = `<div class="error">${result.msg || 'Failed to get information'}</div>`;
                }
            } catch (error) {
                console.error('Content load failed:', error);
                document.getElementById('contentArea').innerHTML = '<div class="error">Failed to load content<br><small>' + (error.message || 'Connection failed') + '</small></div>';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyContent() {
            navigator.clipboard.writeText(currentContent).then(() => {
                alert('Copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy');
            });
        }
        
        function downloadContent() {
            const blob = new Blob([currentContent], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mgc-info.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        loadContent();
    </script>
</body>
</html>
